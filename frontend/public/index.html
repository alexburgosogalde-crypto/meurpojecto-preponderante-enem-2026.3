<style>html,body{margin:0;padding:0;background:#0b2545;}</style>
<style id="enem-mobile-critical">

  body{padding-bottom:50px!important;margin:0!important;min-height:100vh!important}
  .conteudo-barra-brasil{position:fixed!important;top:0!important;left:0!important;right:0!important;width:100%!important;height:40px!important;background-color:#071d41!important;z-index:101!important}
  html body .css-14le3h7{height:52px!important;min-height:52px!important;max-height:52px!important;position:fixed!important;top:40px!important;left:0!important;right:0!important;width:100%!important;background-color:#1351b4!important;z-index:100!important;justify-content:flex-start!important;align-items:center!important;padding:0 12px!important;display:flex!important}
  html body .css-14le3h7>img{max-height:40px!important;width:auto!important;padding:6px!important;margin:0!important}
  .mobile-power-btn{position:absolute!important;right:12px!important;top:50%!important;transform:translateY(-50%)!important;background:transparent!important;border:0!important;color:#fff!important;width:40px!important;height:40px!important;display:flex!important;align-items:center!important;justify-content:center!important;cursor:pointer!important;padding:0!important;z-index:5!important}
  .mobile-power-btn svg{width:22px!important;height:22px!important}
  html body .css-kzkx1t{top:95px!important;height:auto!important;min-height:calc(100vh - 145px)!important;border-radius:0!important}
  .css-17m656a{font-size:0!important;line-height:0!important;color:transparent!important;height:50px!important;min-height:50px!important;max-height:50px!important;padding:0!important;background-color:#1351b4!important;position:fixed!important;bottom:0!important;left:0!important;right:0!important;width:100%!important;z-index:99!important;overflow-x:auto!important;overflow-y:hidden!important}
  .css-17m656a *{font-size:0!important;line-height:0!important;color:transparent!important;background-color:transparent!important;background:transparent!important;box-shadow:none!important;border:0!important}
  .css-17m656a .css-1ckwuji,.css-17m656a span,.css-17m656a label,.css-17m656a p{display:none!important}
  .css-17m656a svg,.css-17m656a img{width:22px!important;height:22px!important;color:#fff!important;fill:#fff!important;stroke:#fff!important;flex:0 0 22px!important;background:transparent!important}
  .css-17m656a .css-15jw0c5>.css-6nj1yj:last-child,.css-17m656a .css-15jw0c5>.css-1t95esl:last-child{display:none!important}
  .css-17m656a .css-15jw0c5,.css-17m656a .css-vzoa3y{display:flex!important;flex-direction:row!important;align-items:center!important;justify-content:space-around!important;flex-wrap:nowrap!important;height:50px!important;width:100%!important;min-width:100%!important;background:transparent!important}
  .css-17m656a .css-6nj1yj,.css-17m656a .css-1t95esl{height:50px!important;padding:0 10px!important;flex:1 1 auto!important;display:flex!important;align-items:center!important;justify-content:center!important;background:transparent!important}
  .css-17l7yx8{display:none!important}
  #mobile-menu-toggle{display:none!important}
}
</style></head>
<body>
<div id="root"></div>

<link rel="stylesheet" href="/mobile-fixes-v3.css"><script src="/mobile-autoscroll-v3.js"></script>
<button id="mobile-menu-toggle" data-testid="mobile-menu-toggle" aria-label="Abrir menu">&#9776;</button>
<script>
(function(){
  function bind(){
    var btn=document.getElementById('mobile-menu-toggle');
    if(!btn || btn.dataset.b) return;
    btn.dataset.b='1';
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      document.body.classList.toggle('menu-open');
    });
    document.addEventListener('click', function(e){
      if(!document.body.classList.contains('menu-open')) return;
      var s=document.querySelector('.css-1d45oes');
      if(s && !s.contains(e.target) && e.target.id!=='mobile-menu-toggle'){
        document.body.classList.remove('menu-open');
      }
    });
  }
  if(document.readyState!=='loading') bind();
  else document.addEventListener('DOMContentLoaded', bind);
})();
</script>

</body>
